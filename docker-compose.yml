version: '3.8'

services:
  # ============================================================
  # Main OpenMini Server
  # ============================================================
  openmini:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        - BUILD_FEATURES=${BUILD_FEATURES:-}
    image: ghcr.io/skin1987/openmini:${OPENMINI_VERSION:-latest}
    container_name: openmini-server
    restart: unless-stopped
    ports:
      - "${GRPC_PORT:-50051}:50051"    # gRPC API
      - "${HTTP_PORT:-8080}:8080"     # HTTP REST API
      - "${METRICS_PORT:-9090}:9090"  # Prometheus metrics
    volumes:
      - ${MODEL_PATH:-./models}:/data/models:ro           # Model weights (read-only)
      - ${CONFIG_PATH:-./config}:/etc/openmini:ro         # Configuration
      - ${LOG_PATH:-./logs}:/data/logs                   # Logs (persistent)
      - ${CACHE_PATH:-./cache}:/data/cache               # Cache (persistent)
    environment:
      - RUST_LOG=${LOG_LEVEL:-info}
      - OPENMINI_HARDWARE_BACKEND=${HARDWARE_BACKEND:-auto}
      - OPENMINI_MAX_MEMORY_GB=${MAX_MEMORY_GB:-16}
      - OPENMINI_NUM_WORKERS=${NUM_WORKERS:-4}
      - OPENMINI_CUDA_VISIBLE_DEVICES=${CUDA_DEVICES:-0}
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-8}'
          memory: ${MEMORY_LIMIT:-16G}
        reservations:
          cpus: '${CPU_RESERVE:-2}'
          memory: ${MEMORY_RESERVE:-4G}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - openmini-network
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================================
  # Optional: Prometheus Monitoring
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: openmini-prometheus
    restart: unless-stopped
    ports:
      - "${PROM_PORT:-9091}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - openmini-network
    profiles:
      - monitoring

  # ============================================================
  # Optional: Grafana Dashboard
  # ============================================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: openmini-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - openmini-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

  # ============================================================
  # Optional: Redis Cache (for session management)
  # ============================================================
  redis:
    image: redis:7.2-alpine
    container_name: openmini-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - openmini-network
    profiles:
      - cache

networks:
  openmini-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  prometheus-data:
  grafana-data:
  redis-data:

# ============================================================
# Environment Variables (.env file)
# ============================================================
# Copy this section to .env and customize:

# OPENMINI_VERSION=v1.2.0-beta.1
# GRPC_PORT=50051
# HTTP_PORT=8080
# METRICS_PORT=9090
# LOG_LEVEL=info
# HARDWARE_BACKEND=auto  # auto | cpu | cuda | metal
# MAX_MEMORY_GB=16
# NUM_WORKERS=4
# CUDA_DEVICES=0
# MODEL_PATH=./models
# CONFIG_PATH=./config
# LOG_PATH=./logs
# CACHE_PATH=./cache
#
# Resource Limits
# CPU_LIMIT=8
# MEMORY_LIMIT=16G
# CPU_RESERVE=2
# MEMORY_RESERVE=4G
#
# Monitoring (optional, use: docker-compose --profile monitoring up)
# PROM_PORT=9091
# GRAFANA_PORT=3000
# GRAFANA_USER=admin
# GRAFANA_PASSWORD=admin
#
# Redis Cache (optional, use: docker-compose --profile cache up)
# REDIS_PORT=6379
