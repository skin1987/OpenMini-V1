name: Bug Report
description: File a bug report to help us improve OpenMini-V1
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug 描述
        简要描述这个bug

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何复现这个问题
      placeholder: |
        1. 运行 `...`
        2. 输入 `...`
        3. 观察到 `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么

  - type: dropdown
    id: component
    attributes:
      label: 影响模块
      options:
        - Inference Engine (FA3/NSA/Kascade)
        - Model Loading (GGUF)
        - Quantization
        - GPU/CUDA
        - Training (GRPO)
        - gRPC Server
        - Benchmark
        - Other

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      placeholder: |
        - OS: [e.g., macOS 15, Ubuntu 22.04]
        - Rust version: [e.g., 1.82]
        - GPU: [e.g., RTX 4090 / Apple M3]
        - Model: [e.g., llama-8b-Q4_K_M]

  - type: textarea
    id: logs
    attributes:
      label: 相关日志/错误信息
      render: shell
