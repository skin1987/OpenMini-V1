name: ✨ Feature Request
about: Suggest an idea for this project
title: '[FEATURE] <short description>'
labels: 'enhancement'
assignees: ''
body:
  - type: markdown
    attributes:
      value: |
        ## ✨ Feature Description

        **Clear and concise description of the problem this feature solves.**
  - type: textarea
    id: problem-description
    attributes:
      label: Problem Description
      description: Is your feature request related to a problem? Please describe.
      placeholder: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
    validations:
      required: true
  - type: textarea
    id: solution-description
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like
      placeholder: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ## 💡 Use Cases

        **Describe specific scenarios where this feature would be useful:**
  - type: textarea
    id: use-case-1
    attributes:
      label: Use Case 1
      description: Describe the first use case
      placeholder: |
        - User action: ...
        - Expected result: ...
    validations:
      required: false
  - type: textarea
    id: use-case-2
    attributes:
      label: Use Case 2
      description: Describe the second use case (optional)
      placeholder: |
        - User action: ...
        - Expected result: ...
    validations:
      required: false
  - type: textarea
    id: additional-use-cases
    attributes:
      label: Additional Use Cases
      description: Any other use cases?
      placeholder: Describe any additional use cases here...
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        ## 🎯 Proposed Implementation

        **If you have ideas about how to implement this feature, describe them here:**
  - type: textarea
    id: api-design
    attributes:
      label: API Design (if applicable)
      description: Example proposed API
      placeholder: |
        ```rust
        // Example proposed API
        pub fn new_feature(param: Type) -> Result<Output> {
            // implementation idea
        }
        ```
      render: rust
    validations:
      required: false
  - type: textarea
    id: config-changes
    attributes:
      label: Configuration Changes (if applicable)
      description: Example new configuration options
      placeholder: |
        ```toml
        # Example new config option
        [new_feature]
        enabled = true
        option = "value"
        ```
      render: toml
    validations:
      required: false
  - type: textarea
    id: performance-considerations
    attributes:
      label: Performance Considerations
      description: Impact on performance
      placeholder: |
        - Impact on latency: [e.g., +5ms per request]
        - Memory overhead: [e.g., ~100MB additional]
        - Compatibility: [e.g., breaks backward compatibility?]
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        ## 🔄 Alternatives Considered

        **Describe alternative solutions or features you've considered:**
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What other solutions have you considered?
      placeholder: |
        - Option A: ... (pros/cons)
        - Option B: ... (pros/cons)
        - Current workaround: ...
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        ## 📊 Priority & Impact

        **How important is this feature to you?**
  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How important is this feature to you?
      options:
        - 🔴 Must-have - Critical for my use case
        - 🟠 Should-have - Important improvement
        - 🟡 Nice-to-have - Would be convenient
        - 🔵 Won't fix / Low priority - Not urgent
    validations:
      required: true
  - type: dropdown
    id: user-impact
    attributes:
      label: Estimated User Impact
      description: How many users would this affect?
      options:
        - Affects many users (>50%)
        - Affects some users (10-50%)
        - Affects few users (<10%)
        - Only affects me
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ## 🧪 Testing Strategy (if proposing implementation)

        **How would you test this feature?**
  - type: checkboxes
    id: testing-strategy
    attributes:
      label: Testing Approach
      description: Select all that apply
      options:
        - label: Unit tests for core logic
          required: false
        - label: Integration tests with existing modules
          required: false
        - label: Benchmark tests for performance validation
          required: false
        - label: Manual testing checklist
          required: false
  - type: markdown
    attributes:
      value: |
        ## 📚 Additional Context

        **Add any other context, mockups, or screenshots about the feature request here:**
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or screenshots
      placeholder: Add any other context here...
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      description: Please confirm the following before submitting
      options:
        - label: I have checked that this feature hasn't been requested already
          required: true
        - label: I'm willing to implement this feature myself (assign me!)
          required: false
        - label: I can help test/review implementations from others
          required: false
  - type: input
    id: related-issues
    attributes:
      label: Related Issues/PRs
      description: Link to related issues or PRs
      placeholder: Closes #123, Related to #456
    validations:
      required: false
  - type: markdown
    attributes:
      value: |

        ---

        **Thank you for your suggestion! We appreciate community input. 🚀**
