# OpenMini CI Pipeline

name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Code Quality Check (stable)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev build-essential

      - name: Install protoc
        uses: arduino/setup-protoc@v3

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy lints
        run: cargo clippy --all-targets --locked -- -D warnings

  test:
    name: Test Suite (stable)
    runs-on: ubuntu-latest
    needs: [check]
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev build-essential

      - name: Install protoc
        uses: arduino/setup-protoc@v3

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run unit tests
        run: cargo test --workspace --lib --locked

      - name: Run integration tests
        run: cargo test --workspace --test '*' --locked

  build:
    name: Build Verification (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev build-essential

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl protobuf

      - name: Install protoc
        uses: arduino/setup-protoc@v3

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build project
        run: cargo build --workspace --release --locked

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: |
          cargo install cargo-audit@0.17.7 || cargo install cargo-audit || true
          if ! command -v cargo-audit &> /dev/null; then
            echo "cargo-audit install failed, skipping audit"
            exit 0
          fi

      - name: Run security audit
        run: cargo audit || true
