# OpenMini CI Pipeline - 完整持续集成管道
# 功能：代码质量检查、测试、安全审计、性能基准
# 触发条件：PR到main分支 + push到main分支

name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 全局环境变量配置
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # 质量门禁阈值配置
  CLIPPY_WARNINGS_THRESHOLD: 50
  COVERAGE_THRESHOLD: 80
  RUST_VERSION_STABLE: stable
  RUST_VERSION_BETA: beta

jobs:
  # ============================================================
  # Job 1: 代码质量检查 (Lint & Format)
  # 包含：格式检查、Clippy静态分析、文档生成检查
  # ============================================================
  check:
    name: Code Quality Check (${{ matrix.rust_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust_version: [stable, beta]
        feature_profile:
          - name: "default"
            features: ""
          - name: "candle+monitoring"
            features: "candle,monitoring,compression"
        exclude:
          # grpc+distributed 存在循环依赖，单独测试
          # nightly_avx512 需要nightly Rust，不在stable/beta矩阵中测试
          - rust_version: stable
            feature_profile:
              name: "avx512"
              features: "nightly_avx512"
          - rust_version: beta
            feature_profile:
              name: "avx512"
              features: "nightly_avx512"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain ${{ matrix.rust_version }}
        uses: dtolnay/rust-toolchain@1.87.0
        with:
          toolchain: ${{ matrix.rust_version }}
          components: rustfmt, clippy, rust-docs

      # 缓存 Cargo 依赖和编译产物
      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.rust_version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust_version }}-
            ${{ runner.os }}-cargo-

      # 步骤1: 代码格式检查 (必须通过)
      - name: Check code formatting
        run: cargo fmt --all -- --check

      # 步骤2: Clippy 静态分析 (带警告计数)
      - name: Run Clippy lints
        id: clippy
        run: |
          echo "开始运行 Clippy 静态分析 (feature: ${{ matrix.feature_profile.name }})..."
          # 构建特性标志
          FEATURE_FLAGS="${{ matrix.feature_profile.features }}"
          if [ -n "$FEATURE_FLAGS" ]; then
            CLIPPY_CMD="cargo clippy --all-targets --features $FEATURE_FLAGS -- -D warnings"
          else
            CLIPPY_CMD="cargo clippy --all-targets -- -D warnings"
          fi
          # 运行clippy并将输出保存到临时文件
          eval $CLIPPY_CMD 2>&1 | tee clippy_output.txt || true
          # 统计警告数量
          WARNING_COUNT=$(grep -c "warning:" clippy_output.txt 2>/dev/null || echo "0")
          echo "clippy_warnings=$WARNING_COUNT" >> $GITHUB_OUTPUT
          echo "⚠️  Clippy 警告数量: $WARNING_COUNT"
          # 检查是否超过阈值
          if [ "$WARNING_COUNT" -gt "$CLIPPY_WARNINGS_THRESHOLD" ]; then
            echo "::warning::Clippy warnings ($WARNING_COUNT) exceed threshold ($CLIPPY_WARNINGS_THRESHOLD)"
          fi

      # 步骤3: 文档生成检查
      - name: Check documentation generation
        run: cargo doc --no-deps --workspace 2>&1 | tee doc_output.txt || true
        continue-on-error: true

      - name: Upload Clippy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-report-${{ matrix.rust_version }}
          path: clippy_output.txt
          retention-days: 7

  # ============================================================
  # Job 2: 测试套件 + 覆盖率收集
  # 包含：单元测试、集成测试、覆盖率报告
  # 质量门禁：测试必须100%通过才能合并
  # ============================================================
  test:
    name: Test Suite (${{ matrix.rust_version }})
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        rust_version: [stable, beta]

    # PostgreSQL 服务用于集成测试
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: openmini_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain ${{ matrix.rust_version }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_version }}

      # 缓存依赖
      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-test-${{ matrix.rust_version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-${{ matrix.rust_version }}-
            ${{ runner.os }}-cargo-

      # 步骤1: 单元测试 (库测试)
      - name: Run unit tests
        id: unit_test
        run: |
          echo "运行单元测试..."
          cargo test --workspace --lib -- --nocapture 2>&1 | tee unit_test_output.txt
          UNIT_TEST_EXIT=$?
          if [ $UNIT_TEST_EXIT -ne 0 ]; then
            echo "::error::单元测试失败！请修复失败的测试用例后重新提交。"
            exit 1
          fi
          echo "✅ 单元测试全部通过"

      # 步骤2: 集成测试
      - name: Run integration tests
        id: integration_test
        run: |
          echo "运行集成测试..."
          cargo test --workspace --test '*' -- --nocapture 2>&1 | tee integration_test_output.txt
          INTEGRATION_TEST_EXIT=$?
          if [ $INTEGRATION_TEST_EXIT -ne 0 ]; then
            echo "::error::集成测试失败！请修复失败的测试用例后重新提交。"
            exit 1
          fi
          echo "✅ 集成测试全部通过"

      # 步骤3: 代码覆盖率收集 (使用 tarpaulin)
      - name: Generate code coverage
        id: coverage
        uses: actions-rs/tarpaulin@v0.1
        continue-on-error: true
        with:
          args: '--workspace --out Xml --ignore-tests'

      # 步骤4: 覆盖率质量门禁检查
      - name: Check coverage threshold
        if: steps.coverage.outcome == 'success'
        run: |
          echo "📊 代码覆盖率报告已生成"
          echo "覆盖率报告路径: cobertura.xml"
          echo "⚠️  建议保持覆盖率 > ${COVERAGE_THRESHOLD}%"

      # 上传覆盖率报告
      - name: Upload coverage to Codecov
        if: steps.coverage.outcome == 'success'
        uses: codecov/codecov-action@v4
        with:
          file: cobertura.xml
          flags: unittests
          name: codecov-openmini-${{ matrix.rust_version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      # 上传测试产物
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.rust_version }}
          path: |
            unit_test_output.txt
            integration_test_output.txt
          retention-days: 14

  # ============================================================
  # Job 3: 安全审计
  # 包含：依赖漏洞扫描、许可证合规、Secret检测
  # 质量门禁：CRITICAL漏洞 = 0 才能合并
  # ============================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史用于gitleaks

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      # 缓存
      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
          key: ${{ runner.os }}-cargo-security-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-security-

      # 安装安全工具
      - name: Install security tools
        run: |
          echo "安装安全审计工具..."
          cargo install cargo-audit
          cargo install cargo-deny
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/main/install.sh | sh

      # 步骤1: 依赖漏洞扫描 (cargo audit)
      - name: Run dependency vulnerability scan
        id: audit
        run: |
          echo "🔍 开始依赖漏洞扫描..."
          cargo audit 2>&1 | tee audit_output.txt
          AUDIT_EXIT=$?

          # 检查是否有 CRITICAL 级别漏洞
          if grep -qi "CRITICAL" audit_output.txt; then
            echo "::error::发现 CRITICAL 级别的安全漏洞！请立即修复依赖项后再合并。"
            echo "has_critical=true" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "has_critical=false" >> $GITHUB_OUTPUT
            echo "✅ 未发现 CRITICAL 级别漏洞"
          fi

          exit $AUDIT_EXIT
        continue-on-error: true

      # 步骤2: 许可证合规检查 (cargo deny)
      - name: Check license compliance
        id: deny
        run: |
          echo "📋 开始许可证合规检查..."
          # 如果存在 deny.toml 配置文件则运行检查
          if [ -f "deny.toml" ] || [ -f ".cargo/deny.toml" ]; then
            cargo deny check 2>&1 | tee deny_output.txt
            DENY_EXIT=$?
            if [ $DENY_EXIT -ne 0 ]; then
              echo "::warning::许可证合规检查发现问题，请查看详细报告"
            fi
            echo "✅ 许可证合规检查完成"
          else
            echo "ℹ️  未找到 deny.toml 配置文件，跳过许可证检查"
            echo "建议创建 .cargo/deny.toml 配置许可证策略"
          fi
        continue-on-error: true

      # 步骤3: Secret 检测 (Gitleaks)
      - name: Scan for secrets with Gitleaks
        id: gitleaks
        run: |
          echo "🔐 开始 Secret 检测..."
          ./gitleaks detect --source . --verbose --report-path gitleaks_report.json 2>&1 | tee gitleaks_output.txt || true
          if [ -f gitleaks_report.json ] && [ -s gitleaks_report.json ]; then
            LEAKS_COUNT=$(jq '.[] | length' gitleaks_report.json 2>/dev/null || echo "0")
            if [ "$LEAKS_COUNT" -gt 0 ]; then
              echo "::error::Gitleaks 发现可能的敏感信息泄露！请检查代码中的密钥、密码等。"
              echo "has_leaks=true" >> $GITHUB_OUTPUT
            else
              echo "has_leaks=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_leaks=false" >> $GITHUB_OUTPUT
            echo "✅ 未检测到泄露的敏感信息"
          fi
        continue-on-error: true

      # 上传安全报告
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            audit_output.txt
            deny_output.txt
            gitleaks_output.txt
            gitleaks_report.json
          retention-days: 30

  # ============================================================
  # Job 4: 性能基准测试 (可选)
  # 仅在 main 分支的 push 事件时运行
  # 用于监控性能回归
  # ============================================================
  bench:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      # 缓存
      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-bench-

      # 运行基准测试
      - name: Run benchmarks
        run: |
          echo "📈 运行性能基准测试..."
          cargo bench --workspace -- --save-baseline main 2>&1 | tee bench_output.txt || true
          echo "✅ 基准测试完成"

      # 存储基准测试结果
      - name: Store benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            target/criterion/
            bench_output.txt
          retention-days: 30

  # ============================================================
  # Job 5: 构建验证 (多平台)
  # 确保 Linux 和 macOS 平台都能成功编译
  # ============================================================
  build:
    name: Build Verification (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # 缓存
      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-

      # 编译项目
      - name: Build project for ${{ matrix.target }}
        run: cargo build --workspace --target ${{ matrix.target }} --release

      # 上传构建产物 (仅 Linux)
      - name: Upload build artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}-release
          path: target/${{ matrix.target }}/release/openmini-server
          retention-days: 7

  # ============================================================
  # 总结 Job: 汇总所有结果
  # ============================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [check, test, security, build]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          echo "==========================================="
          echo "   OpenMini CI Pipeline 执行总结"
          echo "==========================================="
          echo ""
          echo "✅ Code Quality Check: ${{ needs.check.result }}"
          echo "✅ Test Suite: ${{ needs.test.result }}"
          echo "🔒 Security Audit: ${{ needs.security.result }}"
          echo "🔨 Build Verification: ${{ needs.build.result }}"
          echo ""
          echo "==========================================="

          # 检查是否有失败的任务
          if [ "${{ needs.check.result }}" == "failure" ] || \
             [ "${{ needs.test.result }}" == "failure" ] || \
             [ "${{ needs.security.result }}" == "failure" ] || \
             [ "${{ needs.build.result }}" == "failure" ]; then
            echo "❌ CI Pipeline 失败！请检查上方任务的详细输出。"
            exit 1
          else
            echo "🎉 CI Pipeline 全部通过！"
          fi
