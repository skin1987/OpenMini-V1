name: Debug CI

on:
  push:
    branches: [main]

jobs:
  debug-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.87.0
        with:
          components: rustfmt, clippy

      - name: Rust version
        run: rustc --version && cargo --version

      - name: Cargo check (lib only)
        run: cargo check --lib 2>&1 | tail -50

      - name: Clippy lib default features
        run: cargo clippy --lib -- -D warnings 2>&1 | tail -80

      - name: Clippy all-targets default
        run: cargo clippy --all-targets -- -D warnings 2>&1 | tail -100 || true
