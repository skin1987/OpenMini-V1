name: Final Diag

on:
  push:
    branches: [main]

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev protobuf-compiler
      - uses: dtolnay/rust-toolchain@1.87.0
        with:
          components: clippy
      - name: Full clippy output
        run: cargo clippy --all-targets -- -D warnings 2>&1 | head -200 || true
      - name: Check if .cargo/config exists
        run: cat .cargo/config.toml 2>/dev/null || echo "No config file"
      - name: Rust version
        run: rustc --version && rustc -Vv
