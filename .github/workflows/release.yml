name: Release Pipeline

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.2.0-beta.1

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================
  # Job 1: Run Tests (Quality Gate)
  # ============================================================
  test:
    name: 🧪 Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔨 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: 💾 Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: 🏗️ Build project
        run: cargo build --workspace

      - name: ✅ Run unit tests
        run: cargo test --workspace --lib -- --nocapture

      - name: ✅ Run integration tests
        run: |
          cargo test --package openmini-server --test dsa_integration_test
          cargo test --package openmini-server --lib rl::
          cargo test --package openmini-server --lib hardware::gpu::metal::

      - name: 🔍 Clippy check
        run: cargo clippy --workspace --lib -- -D warnings
        continue-on-error: true  # Don't block release on warnings

      - name: 📝 Format check
        run: cargo fmt --all -- --check

  # ============================================================
  # Job 2: Build Release Binaries (Multi-platform)
  # ============================================================
  build:
    name: 📦 Build Release (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: openmini-server-linux-x86_64
            asset_name: openmini-v${{ github.ref_name }}-linux-x86_64.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: openmini-server-linux-aarch64
            asset_name: openmini-v${{ github.ref_name }}-linux-aarch64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: openmini-server-macos-x86_64
            asset_name: openmini-v${{ github.ref_name }}-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: openmini-server-macos-aarch64
            asset_name: openmini-v${{ github.ref_name }}-macos-aarch64.tar.gz
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔨 Install Rust toolchain (with target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 💾 Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ matrix.target }}-

      - name: 🏗️ Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: 📁 Create release archive
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          
          # Create tarball with binary + basic files
          tar -czvf ../../${{ matrix.asset_name }} \
            openmini-server
          
          # Generate SHA256 checksum
          shasum -a 256 ../../${{ matrix.asset_name }} > ../../${{ matrix.asset_name }}.sha256
          
          echo "✅ Created ${{ matrix.asset_name }}"
          ls -lh ../../${{ matrix.asset_name }}*

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
          retention-days: 7

  # ============================================================
  # Job 3: Build Docker Images
  # ============================================================
  docker:
    name: 🐳 Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ============================================================
  # Job 4: Publish to crates.io (optional)
  # ============================================================
  publish-cargo:
    name: 📦 Publish to crates.io
    needs: [test, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-beta') && !contains(github.ref, '-rc')
    environment:
      name: crates.io
      url: https://crates.io
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔨 Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 💾 Cache cargo
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: 📦 Login to crates.io
        run: cargo login ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: 🚀 Publish openmini-proto
        run: cargo publish --package openmini-proto --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: ⏳ Wait for proto crate indexing
        run: sleep 30

      - name: 🚀 Publish openmini-server
        run: cargo publish --package openmini-server --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ============================================================
  # Job 5: Create GitHub Release
  # ============================================================
  release:
    name: 🎉 Create GitHub Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: openmini-server-*
          merge-multiple: true

      - name: 📋 Generate changelog from git log
        id: changelog
        run: |
          # Get previous tag for comparison
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          
          # Save to file for release notes
          echo "$CHANGELOG" > /tmp/changelog.txt
          
          # Also save as output variable
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/changelog.txt
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "📋 Changelog generated:"
          cat /tmp/changelog.txt | head -20

      - name: 🎊 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "🎉 OpenMini-V1 ${{ github.ref_name }}"
          body: |
            ## OpenMini-V1 ${{ github.ref_name }}
            
            **Release Date**: ${{ github.event.repository.pushed_at }}
            
            ---
            
            ### 📦 Downloads
            
            | Platform | Architecture | Download |
            |----------|-------------|----------|
            | Linux | x86_64 | [Download](${{ steps.release.outputs.linux_x86_url }}) |
            | Linux | ARM64 | [Download](${{ steps.release.outputs.linux_arm_url }}) |
            | macOS | Intel | [Download](${{ steps.release.outputs.macos_x86_url }}) |
            | macOS | Apple Silicon | [Download](${{ steps.release.outputs.macos_arm_url }}) |
            
            ### 🐳 Docker
            
            ```bash
            docker pull ghcr.io/skin1987/openmini:${{ github.ref_name }}
            ```
            
            ### 📋 What's Changed
            
            ${{ steps.changelog.outputs.changelog }}
            
            ---
            
            **Full Release Notes**: See [RELEASE_NOTES.md](./RELEASE_NOTES.md)
            
            **Changelog**: See [CHANGELOG.md](./CHANGELOG.md)
            
            **⚠️ Known Issues**: Check [RELEASE_NOTES.md#known-issues](./RELEASE_NOTES.md#known-issues)
          draft: false
          prerelease: ${{ contains(github.ref, '-') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📢 Post to Slack (if configured)
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🚀 *OpenMini-V1 ${{ github.ref_name }} Released!*\n\nSee: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}\"}" \
            $SLACK_WEBHOOK_URL || true

  # ============================================================
  # Job 6: Notify Team (Post-Release)
  # ============================================================
  notify:
    name: 📬 Send Notifications
    needs: release
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: 📊 Summary
        run: |
          echo "## 🎉 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ needs.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | ${{ needs.test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Artifacts | ${{ needs.build.result == 'success' && '✅ Created' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Images | ${{ needs.docker.result == 'success' && '✅ Pushed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ${{ needs.release.result == 'success' && '✅ Created' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Review release assets" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Announce in community channels" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Monitor user feedback" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Update documentation links" >> $GITHUB_STEP_SUMMARY

      - name: 🎯 Set release status
        if: needs.release.result == 'success'
        run: echo "🎉 Release ${{ github.ref_name }} completed successfully!"
      
      - name: ❌ Report failure
        if: needs.release.result != 'success'
        run: |
          echo "::error::Release pipeline failed!"
          echo "Check the failed jobs above for details."
          exit 1
