name: Release Pipeline
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
  packages: write
env:
  CARGO_TERM_COLOR: always
jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - run: cargo test --workspace --lib
      - run: cargo clippy --workspace --lib -- -D warnings
        continue-on-error: true
  build:
    name: Build Release
    needs: test
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, artifact: openmini-server-linux-x86_64 }
          - { os: macos-latest, target: aarch64-apple-darwin, artifact: openmini-server-macos-aarch64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/openmini-server
  release:
    name: Create GitHub Release
    needs: build
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenMini-V1 ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          files: 'artifacts/*/*'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
