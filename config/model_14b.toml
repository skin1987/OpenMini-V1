# ============================================================
# OpenMini-14B Dense Model Training Configuration
# ============================================================
# 14B参数量密集型多模态Transformer模型完整训练配置
# 支持从7B Checkpoint继续预训练的扩展策略
# ============================================================

[model]
# 模型基本信息
name = "OpenMini-14B"
architecture = "MultimodalTransformer"

# 模型规模参数 (14B ~ 14.2B 参数)
vocab_size = 152064              # 词表大小（与Qwen2.5对齐）
hidden_size = 5120               # 隐藏层维度
intermediate_size = 13824        # FFN中间层维度 (5120 * 2.7)
num_attention_heads = 40         # 注意力头数
num_key_value_heads = 10         # GQA: KV头数 (40/4=10, 每4个Query共享1个KV)
num_hidden_layers = 48           # Transformer层数
max_position_embeddings = 131072 # 最大序列长度 (128K context)

# RMSNorm参数
rms_norm_eps = 1e-6              # RMSNorm epsilon
rope_theta = 10000.0             # RoPE基础频率
rope_scaling_type = "linear"     # RoPE扩展类型

[moe]
# MoE (Mixture of Experts) 配置
# 14B-Dense模型不使用MoE，但保留配置以兼容框架
num_experts = 8                  # 专家数量（Dense模式下不启用）
num_experts_per_tok = 2          # 每token激活专家数
router_aux_loss_coef = 0.001     # 路由辅助损失系数
router_z_loss_coef = 0.0001      # 路由z-loss系数

[mla]
# MLA (Multi-head Latent Attention) 配置
# DeepSeek风格的压缩注意力机制
latent_dim = 1024                # 潜在表示维度
compress_ratio = 4.0             # 压缩比
num_kv_heads = 8                 # 压缩后的KV头数

[training]
# 预训练超参数配置
batch_size = 256                 # 全局有效batch size
micro_batch_size = 4             # 单设备micro-batch size
gradient_accumulation_steps = 64 # 梯度累积步数 (256 / 4 = 64)
learning_rate = 3e-4             # 峰值学习率
weight_decay = 0.01              # 权重衰减
warmup_steps = 5000              # Warmup步数
total_steps = 500000             # 总训练步数
save_steps = 5000                # Checkpoint保存间隔
eval_steps = 2500                # 评估间隔
dtype = "bf16"                   # 训练精度 (bf16混合精度)

# 梯度裁剪
max_grad_norm = 1.0              # 最大梯度范数
grad_accum_dtype = "fp32"        # 累积精度

# 学习率调度
lr_scheduler_type = "cosine"     # 调度器类型: cosine | linear | cosine_with_restarts
min_lr_ratio = 0.1               # 最小学习率比例 (相对于峰值)

[data]
# 数据配置 - 多源预训练数据混合
train_tokens = "800B"            # 总训练tokens (~800B tokens)
code_tokens = "100B"             # 代码数据占比
chinese_tokens = "200B"          # 中文数据占比
math_tokens = "150B"             # 数学数据占比
science_tokens = "150B"          # 科学数据占比
general_tokens = "200B"          # 通用文本数据占比

# 数据格式
data_format = "pretokenized"     # 预分词格式
max_seq_length = 8192            # 最大序列长度 (用于打包)
packed_sequence = true           # 是否使用序列打包

[sft]
# SFT (Supervised Fine-Tuning) 配置
epochs = 3                       # 微调轮数
learning_rate = 1e-5             # SFT学习率（比预训练低）
lora_rank = 64                   # LoRA秩 (使用LoRA进行高效微调)
lora_alpha = 128                 # LoRA alpha参数
lora_dropout = 0.05              # LoRA dropout
lora_target_modules = [          # LoRA目标模块
    "q_proj",
    "k_proj",
    "v_proj",
    "o_proj",
    "gate_proj",
    "up_proj",
    "down_proj",
]

# SFT损失配置
mask_prompt_loss = true          # 屏蔽prompt部分的loss
response_length_max = 4096       # 最大响应长度

[grpo]
# GRPO (Group Relative Policy Optimization) 配置
# 用于RLHF阶段的策略优化
group_size = 64                  # 组大小（每个prompt生成64个响应）
kl_coef = 0.001                  # KL散度惩罚系数
clip_range = 0.2                 # PPO clip范围
entropy_coef = 0.01              # 熵奖励系数
advantage_norm_eps = 1e-8        # 优势归一化epsilon
grad_clip_norm = 1.0             # GRPO梯度裁剪

# 奖励函数配置
reward_accuracy_weight = 0.7     # 准确性奖励权重
reward_format_weight = 0.3       # 格式奖励权重

[hardware]
# 硬件资源配置
num_gpus = 8                     # GPU数量 (建议8xH100/A100)
gpu_memory_gb = 80               # 单卡显存(GB)
total_memory_gb = 640            # 总显存(GB)

# 并行策略
tensor_parallel_size = 4         # 张量并行度
pipeline_parallel_size = 2       # 流水线并行度
data_parallel_size = 1           # 数据并行度 (由TPxPP自动计算)

# 显存优化
activation_checkpointing = true  # 激活检查点（节省显存）
offload_optimizer = false        # 优化器状态卸载到CPU
mixed_precision = true           # 混合精度训练

[checkpoint]
# Checkpoint管理配置
output_dir = "./checkpoints/14b-dense"
save_strategy = "steps"          # steps | epoch | best
save_total_limit = 5             # 最多保留checkpoint数量
resume_from_checkpoint = ""      # 断点续训路径（留空则从头开始）

# 从7B扩展配置（可选）
base_model_path = "./checkpoints/7b-base"  # 7B base checkpoint路径
expansion_strategy = "random_init"          # 扩展策略: random_init | scaled_copy | interpolation

[logging]
log_every_n_steps = 10           # 日志输出间隔
logging_dir = "./logs/14b-training"
save_metrics_history = true      # 保存指标历史
wandb_project = "openmini-14b"   # Weights & Biases项目名
wandb_run_name = ""              # 运行名称（自动生成）

[early_stopping]
enabled = true                   # 启用早停
patience = 10                    # 连续无改善次数阈值
min_delta = 0.001                # 最小改善幅度
monitor_metric = "val_loss"      # 监控指标
mode = "min"                     # min (越小越好) | max (越大越好)
