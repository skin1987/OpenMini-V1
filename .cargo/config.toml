# =============================================
# OpenMini Cargo 配置文件
# 功能：构建优化、常用命令别名、网络配置
# =============================================

# ---------- 命令别名 ----------
[alias]
# 覆盖率收集命令 (使用 tarpaulin)
cov = "tarpaulin --out Xml --ignore-tests"
# 快速安全审计命令
audit-check = "audit"
# 代码格式检查 (仅检查不修改)
fmt-check = ["fmt", "--all", "--", "--check"]
# Clippy 静态分析 (严格模式)
clippy-strict = ["clippy", "--all-targets", "--all-features", "--", "-D", "warnings"]
# 文档生成 (忽略依赖文档)
doc-no-deps = ["doc", "--no-deps", "--workspace"]
# 清理并重新编译
rebuild = ["clean", "--workspace"]
# 运行所有测试 (带详细输出)
test-verbose = ["test", "--workspace", "--", "--nocapture"]
# 检查但不编译 (所有目标)
check-all = ["check", "--workspace", "--all-targets"]
# 依赖树可视化 (仅第一层)
deps-top = ["tree", "--depth", "1"]
# 查找过时的依赖 (仅根依赖)
deps-check = ["outdated", "--root-deps-only"]

# ---------- 构建优化选项 ----------
[build]
# Rust 编译器标志优化
# 启用以下优化以提高性能和安全性：
# - 目标CPU特性优化
# - 堆栈溢出保护
# - 警告未使用的导入和变量
rustflags = [
    # 性能优化
    "-C", "target-cpu=native",           # 针对当前 CPU 架构优化
    "-C", "codegen-units=1",             # 更好的优化（但编译更慢）

    # 安全性增强
    "-C", "force-frame-pointers=yes",    # 强制帧指针，便于调试和性能分析

    # 警告级别
    "-W", "unused-imports",              # 警告未使用的导入
    "-W", "unused_variables",            # 警告未使用的变量
]

# ---------- 网络配置 ----------
[net]
# 使用 Git CLI 进行 HTTP 操作
# 解决 GitHub API 速率限制问题，提高大仓库克隆速度
git-fetch-with-cli = true

# ---------- 目标特定配置 ----------
# [target.aarch64-apple-darwin]
# macOS ARM (Apple Silicon) 特定配置
# rustflags = ["-C", "target-feature=-fp16"]  # 禁用 fp16 以避免某些 Metal 兼容性问题

# [target.x86_64-unknown-linux-gnu]
# Linux x86_64 特定配置
# rustflags = ["-C", "target-feature=+avx2"]  # 启用 AVX2 指令集优化
